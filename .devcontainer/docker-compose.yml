# alien-scanner Dev Container：仓库 bind mount；colcon 的 build/install/log 用命名卷（避免 Hyper-V bind I/O 卡死）

name: alien-scanner

services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    image: alien-scanner-jazzy:latest
    container_name: alien-scanner-dev
    stdin_open: true
    tty: true
    working_dir: /workspaces/alien-scanner
    env_file:
      - ../.env
    environment:
      - ROS_DISTRO=jazzy
      - DISPLAY=${DISPLAY:-host.docker.internal:0.0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "64342:64342"
    volumes:
      - ..:/workspaces/alien-scanner:cached
      - alien_build:/workspaces/alien-scanner/ws/build
      - alien_install:/workspaces/alien-scanner/ws/install
      - alien_log:/workspaces/alien-scanner/ws/log
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    command: ["sleep", "infinity"]

volumes:
  alien_build:
    name: devcontainer_alien_build
  alien_install:
    name: devcontainer_alien_install
  alien_log:
    name: devcontainer_alien_log
